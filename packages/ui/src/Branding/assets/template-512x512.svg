<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="360" viewBox="0 0 360 360">
  <defs>
    <clipPath id="clip3">
      <rect x="0" y="0" width="360" height="360" rx="84.6" ry="84.6"/>
    </clipPath>
    <linearGradient id="tile3" x1="0" y1="0" x2="1" y2="1" gradientTransform="rotate(60 0.5 0.5)">
      <stop offset="0%" stop-color="#3c2f2c"/>
      <stop offset="100%" stop-color="#180e14"/>
    </linearGradient>
    <radialGradient id="glow3a" cx="0.3" cy="0.3" r="0.45">
      <stop offset="0%" stop-color="rgb(255,89,44)" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="rgb(255,89,44)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3b" cx="0.7" cy="0.75" r="0.5">
      <stop offset="0%" stop-color="rgb(189,32,153)" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="rgb(189,32,153)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="reflTop3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="b3a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff966e"/>
      <stop offset="100%" stop-color="#ff397d"/>
    </linearGradient>
    <linearGradient id="b3b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4283"/>
      <stop offset="100%" stop-color="#bd2099"/>
    </linearGradient>
    <linearGradient id="b3hl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="rgb(83,0,62)" flood-opacity="0.6"/>
    </filter>
    <filter id="glowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <!-- Dark glass tile -->
  <rect x="0" y="0" width="360" height="360" rx="84.6" ry="84.6" fill="url(#tile3)"/>
  <!-- Inner glows (blurred, clipped to tile) -->
  <g filter="url(#glowBlur)" clip-path="url(#clip3)">
    <rect x="29" y="29" width="302" height="302" fill="url(#glow3a)"/>
    <rect x="29" y="29" width="302" height="302" fill="url(#glow3b)"/>
  </g>
  <!-- Top reflection sheen -->
  <rect x="14.4" y="14.4" width="331.2" height="172.8" rx="71.91" ry="71.91" fill="url(#reflTop3)"/>
  <!-- Layered brush strokes with drop shadow -->
  <g filter="url(#ds3)">
    <path d="M 70 244 C 96 196, 144 160, 200 152 C 244 146, 270 168, 252 196 C 234 222, 188 224, 158 220"
          stroke="url(#b3b)" stroke-width="46" stroke-linecap="round" fill="none" opacity="0.85"
          transform="translate(14,16)"/>
    <path d="M 78 234 C 110 174, 170 130, 234 122 C 274 117, 296 144, 280 176 C 264 208, 218 216, 178 212 C 138 208, 108 220, 96 244"
          stroke="url(#b3a)" stroke-width="48" stroke-linecap="round" fill="none"/>
    <path d="M 92 218 C 122 168, 180 132, 232 124"
          stroke="url(#b3hl)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.41"/>
    <circle cx="98" cy="244" r="5" fill="#ffae89" opacity="0.9"/>
  </g>
  <!-- Edge highlight -->
  <rect x="0.5" y="0.5" width="359" height="359" rx="84.1" ry="84.1"
        fill="none" stroke="white" stroke-opacity="0.077" stroke-width="1"/>
</svg>
