packages:
  - apps/*
  - configs/*
  - design/*
  - packages/*
overrides:
  '@tanstack/react-query': catalog:tanstack
  '@tanstack/query-core': 5.101.2
  react: catalog:react
  react-dom: catalog:react
  ajv@8: ^8.18.0
  body-parser: ^2.0.0
  cookie: ^2.0.0
  express: ^5.0.0
  flatted: ^3.4.2
  form-data: ^4.0.4
  got: ^15.0.0
  handlebars: ^4.7.9
  js-yaml@3: ^5.0.0
  js-yaml@4: ^5.0.0
  lodash: ^4.18.0
  minimatch@3: ^10.0.0
  minimatch@5: ^10.0.0
  minimatch@9: ^10.0.0
  path-to-regexp@0: ^8.0.0
  picomatch@2: ^4.0.0
  picomatch@4: ^4.0.4
  qs: ^6.14.2
  rollup@2: ^4.0.0
  rollup@4: ^4.59.0
  send: ^1.0.0
  serialize-javascript: ^7.0.5
  serve-static: ^2.0.0
  tmp: ^0.2.4
  yaml@1: ^2.0.0
  yaml@2: ^2.8.3
  glob@10: ^13.0.0
# Catalogs are organised by grouping intent so their names map 1:1 to Renovate
# update groups (see renovate.json). Runtime dependencies are split into domain
# catalogs; all dev tooling lives in the single `dev` catalog.
catalogs:
  # Runtime dependencies (Renovate: `fix(deps)`)
  react:
    react: 19.2.7
    react-dom: 19.2.7
    # Version-locked helpers kept alongside React so they bump together.
    '@types/react': 19.2.17
    '@types/react-dom': 19.2.3
    babel-plugin-react-compiler: 19.1.0-rc.3
  tanstack:
    '@tanstack/react-form': 1.33.1
    '@tanstack/react-query': 5.101.2
    '@tanstack/react-router': 1.170.17
    # Codegen plugin kept with the router so they bump together.
    '@tanstack/router-plugin': 1.168.19
  pixi:
    '@pixi/react': 8.0.5
    pixi-filters: 6.1.5
    pixi-viewport: 6.0.3
    pixi.js: 8.19.0
  ui:
    '@fontsource/rubik': 5.2.8
    '@heroicons/react': 2.2.0
    clsx: 2.1.1
    daisyui: 5.6.18
    framer-motion: 12.42.2
    react-dropzone: 16.0.0
    react-intl: 10.1.16
  state:
    immer: 11.1.11
    jotai: 2.20.1
    jotai-effect: 2.3.1
  validation:
    '@hookform/resolvers': 5.4.0
    zod: 4.4.3
  # Dev tooling (Renovate: `chore(deps)`)
  dev:
    # eslint
    '@eslint/js': 10.0.1
    eslint: 10.6.0
    eslint-config-prettier: 10.1.8
    eslint-plugin-formatjs: 6.4.16
    eslint-plugin-import-x: 4.17.1
    eslint-plugin-prettier: 5.5.6
    eslint-plugin-react: 7.37.5
    eslint-plugin-react-compiler: 19.1.0-rc.2
    eslint-plugin-react-hooks: 7.1.1
    eslint-plugin-storybook: 10.4.6
    typescript-eslint: 8.62.1
    # typescript
    typescript: 6.0.3
    # tailwind
    tailwindcss: 4.3.2
    '@tailwindcss/aspect-ratio': 0.4.2
    '@tailwindcss/typography': 0.5.20
    '@tailwindcss/vite': 4.3.2
    # vite
    '@rolldown/plugin-babel': 0.2.3
    '@vitejs/plugin-basic-ssl': 2.3.0
    '@vitejs/plugin-react': 6.0.3
    '@vite-pwa/assets-generator': 1.0.2
    vite: 8.1.3
    vite-plugin-http2-proxy: 0.5.1
    vite-plugin-pwa: 1.3.0
    # storybook
    '@storybook/addon-a11y': 10.4.6
    '@storybook/addon-docs': 10.4.6
    '@storybook/addon-mcp': 0.6.0
    '@storybook/addon-themes': 10.4.6
    '@storybook/addon-vitest': 10.4.6
    '@storybook/builder-vite': 10.4.6
    '@storybook/react': 10.4.6
    '@storybook/react-vite': 10.4.6
    storybook: 10.4.6
    # test
    vitest: 4.1.9
    '@vitest/browser': 4.1.9
    '@vitest/browser-playwright': 4.1.9
    '@vitest/coverage-v8': 4.1.9
    '@playwright/test': 1.61.1
    playwright: 1.61.1
    nyc: 18.0.0
    vite-plugin-istanbul: 9.0.1
    # mocks
    '@mocks-server/admin-api-client': 7.0.1
    '@mocks-server/admin-api-paths': 5.0.0
    '@mocks-server/main': 4.1.0
    # misc build/dev tooling
    '@faker-js/faker': 10.5.0
    '@formatjs/cli': 6.16.11
    cross-env: 10.1.0
    move-cli: 2.0.0
    rimraf: 6.1.3
    style-dictionary: 5.5.0
    workbox-window: 7.4.1
allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false
